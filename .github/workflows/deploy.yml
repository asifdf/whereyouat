name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 가져오기
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. JDK 21 설정
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 3. backend에서 빌드 (중요)
      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -DskipTests

      # 4. EB 배포용 패키지 생성 (안정 구조)
      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp backend/target/*.jar deploy/application.jar
          cp Procfile deploy/Procfile
          cp -R .ebextensions deploy/.ebextensions
          cd deploy
          zip -r deployment.zip application.jar Procfile .ebextensions

      # 5. AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 6. S3 업로드 (버전 충돌 방지 핵심)
      - name: Upload to S3
        run: |
          aws s3 cp deploy/deployment.zip \
          s3://elasticbeanstalk-ap-northeast-2-${{ secrets.AWS_ACCOUNT_ID }}/deployment-${{ github.sha }}.zip

      # 7. EB Application Version 생성
      - name: Create EB version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name whereyouat \
            --version-label v-${{ github.sha }} \
            --source-bundle S3Bucket=elasticbeanstalk-ap-northeast-2-${{ secrets.AWS_ACCOUNT_ID }},S3Key=deployment-${{ github.sha }}.zip

      # 8. EB 배포
      - name: Deploy to EB
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name whereyouat-env \
            --version-label v-${{ github.sha }}