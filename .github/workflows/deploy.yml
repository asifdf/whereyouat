name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. JDK 설정 (pom.xml이 21이면 반드시 21 맞춰야 함)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3. Maven 캐시 (속도 개선)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      # 4. Maven 빌드 (fat jar 생성)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 5. artifact 준비 (EB 표준 구조)
      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp target/*.jar deploy/application.jar
          cd deploy
          zip -r deployment.zip .

      # 6. AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 7. S3 업로드 (EB 기본 버킷 사용)
      - name: Upload to S3
        run: |
          aws s3 cp deploy/deployment.zip \
          s3://elasticbeanstalk-ap-northeast-2-${{ secrets.AWS_ACCOUNT_ID }}/deployment.zip

      # 8. EB Application Version 생성
      - name: Create new EB version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name whereyouat \
            --version-label v-${{ github.sha }} \
            --source-bundle S3Bucket=elasticbeanstalk-ap-northeast-2-${{ secrets.AWS_ACCOUNT_ID }},S3Key=deployment.zip

      # 9. EB 환경 업데이트 (배포 실행)
      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name whereyouat-env \
            --version-label v-${{ github.sha }}